<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Aurion's Lucky Wisdom Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    /* ── ROOT VARIABLES ─────────────────────────────── */
    :root {
      --purple-deep:  #3B1265;
      --purple-mid:   #5A2090;
      --gold:         #C8A96E;
      --gold-light:   #E2C98A;
      --cyan:         #00D4FF;
      --white:        #FFFFFF;
      --container-w:  390px;
      --container-h:  844px;
    }

    /* ── RESET ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #1a0835;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    /* ── DEVICE CONTAINER ───────────────────────────── */
    /*
      Desktop: fixed portrait size centred on screen.
      Mobile: full viewport, no border-radius.
    */
    .device {
      position: relative;
      width: var(--container-w);
      height: var(--container-h);
      background: var(--purple-deep);
      border-radius: 28px;
      overflow: hidden;
      box-shadow:
        0 0 0 1.5px rgba(200,169,110,0.35),
        0 30px 80px rgba(0,0,0,0.6);
      z-index: 1;
    }

    @media (max-width: 480px) {
      body { align-items: flex-start; background: var(--purple-deep); }
      .device {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }
    }

    /* ── SCREENS ────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    .screen.active {
      display: flex;
      opacity: 1;
    }

    .screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* ── MEDIA LAYER (image OR video fills the frame) ─ */
    /*
      Usage: add <img> OR <video autoplay muted loop playsinline>
      as first child inside .media-wrap — both are styled the same.
    */
    .media-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .media-wrap img,
    .media-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Overlay so buttons stay readable on top of any image/video */
    .media-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(30,5,60,0.15) 0%,
        rgba(30,5,60,0.55) 100%
      );
      z-index: 1;
    }

    /* Content inside media screens sits above overlay */
    .media-content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      padding-bottom: 60px;
    }

    /* ── BUTTONS ────────────────────────────────────── */
    .btn-enter {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--purple-deep);
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border: none;
      border-radius: 50px;
      padding: 16px 52px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(200,169,110,0.45);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .btn-enter:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(200,169,110,0.6);
    }

    .btn-enter:active { transform: scale(0.97); }

    /* ── SCREEN 1: LANDING ──────────────────────────── */
    #screen-landing {
      /* Fallback background if no image/video supplied */
      background: radial-gradient(ellipse at center, #5A2090 0%, #1a0835 100%);
    }

    /* ── SCREEN 2: PICK A NUMBER ────────────────────── */
    #screen-pick {
      background: var(--purple-deep);
      gap: 0;
      padding: 40px 24px 36px;
    }

    .pick-logo {
      width: 52px;
      margin-bottom: 6px;
    }

    .pick-brand {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      color: var(--cyan);
      letter-spacing: 0.12em;
      margin-bottom: 32px;
      text-align: center;
    }

    .pick-prompt-wrap {
      background: rgba(200,169,110,0.18);
      border: 1.5px solid var(--gold);
      border-radius: 50px;
      padding: 12px 40px;
      margin-bottom: 36px;
    }

    .pick-prompt {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 0.15em;
      text-align: center;
    }

    /* Number grid: 4 top row, 3 bottom — matches screenshot */
    .number-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      width: 100%;
      max-width: 320px;
    }

    .number-grid .num-btn:nth-child(5),
    .number-grid .num-btn:nth-child(6),
    .number-grid .num-btn:nth-child(7) {
      /* Offset bottom row to centre the 3 remaining */
      grid-column: auto;
    }

    /* Bottom row centred: use a wrapper technique */
    .number-grid-bottom {
      display: flex;
      justify-content: center;
      gap: 14px;
      width: 100%;
      max-width: 320px;
      margin-top: 0;
    }

    .num-btn {
      width: 68px;
      height: 68px;
      background: var(--cyan);
      border: none;
      border-radius: 18px;
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--gold);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,212,255,0.25);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s;
      /* Allow custom Canva image as background */
      background-size: cover;
      background-position: center;
    }

    .num-btn:hover {
      transform: translateY(-3px) scale(1.07);
      box-shadow: 0 8px 28px rgba(0,212,255,0.5);
      background-color: #00eaff;
    }

    .num-btn:active { transform: scale(0.95); }

    /* If a Canva image is loaded, hide the text number */
    .num-btn.has-image span { display: none; }

    .pick-footer {
      margin-top: 36px;
      text-align: center;
    }

    .pick-title-block {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 1rem;
      letter-spacing: 0.12em;
    }

    .pick-title-block span {
      display: block;
      font-family: 'Lato', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0;
      margin-top: 4px;
    }

    /* ── SCREEN 3 + 4: CARD (FRONT → FLIP → BACK) ───── */
    #screen-card {
      background: #000;
      perspective: 1200px;
    }

    .card-scene {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .card-scene.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    .card-face img,
    .card-face video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* Fallback placeholders when images not yet loaded */
    .card-face-front {
      background: radial-gradient(ellipse at center, #5A2090 0%, #2a0856 100%);
    }

    .card-face-back {
      background: radial-gradient(ellipse at center, #3B1265 0%, #1a0835 100%);
      transform: rotateY(180deg);
    }

    /* Tap hint shown on card front */
    .tap-hint {
      position: absolute;
      bottom: 28px;
      left: 0; right: 0;
      text-align: center;
      font-family: 'Lato', sans-serif;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.1em;
      animation: pulse 2.2s ease-in-out infinite;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.9; }
    }

    /* Back button on card screens */
    .card-back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(200,169,110,0.25);
      border: 1px solid rgba(200,169,110,0.5);
      border-radius: 50px;
      padding: 7px 18px;
      font-family: 'Lato', sans-serif;
      font-size: 0.8rem;
      color: var(--gold-light);
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.08em;
    }

    .card-back-btn:hover {
      background: rgba(200,169,110,0.4);
    }

    /* ── SCREEN 5: FINALE ───────────────────────────── */
    #screen-finale {
      background: radial-gradient(ellipse at center, #5A2090 0%, #1a0835 100%);
    }

    .finale-buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-restart {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--purple-deep);
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(200,169,110,0.4);
      transition: transform 0.18s ease;
    }

    .btn-restart:hover { transform: translateY(-2px); }

    .btn-close {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--gold-light);
      background: transparent;
      border: 1.5px solid rgba(200,169,110,0.5);
      border-radius: 50px;
      padding: 14px 36px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s;
    }

    .btn-close:hover {
      transform: translateY(-2px);
      border-color: var(--gold);
    }

    /* ── TRANSITION HELPER ──────────────────────────── */
    .device.transitioning .screen { pointer-events: none; }

  </style>
</head>
<body>

<div class="device" id="device">

  <!-- ════════════════════════════════════════════════
       SCREEN 1 — LANDING
       Slot: replace <img> with <video autoplay muted loop playsinline>
              for video backgrounds. Both work identically.
       ════════════════════════════════════════════════ -->
  <div class="screen active" id="screen-landing">

    <!-- MEDIA LAYER: swap src for your Canva export or R2 video URL -->
    <div class="media-wrap">
      <img
        src="https://files.3c-public-library.org/CardGames/AurionDeck/landing.png"
        alt="Landing"
        onerror="this.style.display='none'"
      />
      <!-- VIDEO EXAMPLE (uncomment + remove img above to use video):
      <video autoplay muted loop playsinline>
        <source src="https://files.3c-public-library.org/CardGames/AurionDeck/landing.mp4" type="video/mp4" />
      </video>
      -->
    </div>
    <div class="media-overlay"></div>

    <div class="media-content">
      <button class="btn-enter" onclick="goTo('screen-pick')">ENTER</button>
    </div>

  </div>


  <!-- ════════════════════════════════════════════════
       SCREEN 2 — PICK A NUMBER
       ════════════════════════════════════════════════ -->
  <div class="screen" id="screen-pick">

    <!-- Logo — swap src for your 3C diamond logo -->
    <img
      class="pick-logo"
      src="https://files.3c-public-library.org/CardGames/AurionDeck/logo.png"
      alt="3C Logo"
      onerror="this.style.display='none'"
    />

    <p class="pick-brand">3C Thread To Success</p>

    <div class="pick-prompt-wrap">
      <p class="pick-prompt">PRESS A NUMBER</p>
    </div>

    <!-- Top row: 1 2 3 4 -->
    <div class="number-grid" id="number-grid-top">
      <!-- Buttons injected by JS from DECK_CONFIG -->
    </div>

    <!-- Bottom row: 5 6 7 (centred) -->
    <div class="number-grid-bottom" id="number-grid-bottom">
      <!-- Buttons injected by JS from DECK_CONFIG -->
    </div>

    <div class="pick-footer">
      <div class="pick-title-block">
        AURION'S
        <span>Lucky Wisdom<br>Deck Cards</span>
      </div>
    </div>

  </div>


  <!-- ════════════════════════════════════════════════
       SCREEN 3+4 — CARD (FRONT then FLIP to BACK)
       ════════════════════════════════════════════════ -->
  <div class="screen" id="screen-card">

    <!-- Back to pick screen -->
    <button class="card-back-btn" onclick="goTo('screen-pick'); resetCard()">← Pick Again</button>

    <!-- 3D flip scene -->
    <div class="card-scene" id="cardScene" onclick="flipCard()">

      <!-- FRONT FACE: your Canva front card image -->
      <div class="card-face card-face-front" id="cardFront">
        <!-- img injected by JS -->
      </div>

      <!-- BACK FACE: your Canva message/back card image -->
      <div class="card-face card-face-back" id="cardBack">
        <!-- img injected by JS -->
      </div>

    </div>

    <!-- Tap hint (hides after flip) -->
    <div class="tap-hint" id="tapHint">TAP CARD TO REVEAL</div>

  </div>


  <!-- ════════════════════════════════════════════════
       SCREEN 5 — FINALE
       Same image/video pattern as landing.
       ════════════════════════════════════════════════ -->
  <div class="screen" id="screen-finale">

    <div class="media-wrap">
      <img
        src="https://files.3c-public-library.org/CardGames/AurionDeck/finale.png"
        alt="Finale"
        onerror="this.style.display='none'"
      />
      <!-- VIDEO EXAMPLE:
      <video autoplay muted loop playsinline>
        <source src="https://files.3c-public-library.org/CardGames/AurionDeck/finale.mp4" type="video/mp4" />
      </video>
      -->
    </div>
    <div class="media-overlay"></div>

    <div class="media-content">
      <div class="finale-buttons">
        <button class="btn-restart" onclick="restart()">PLAY AGAIN</button>
        <button class="btn-close"   onclick="closeApp()">CLOSE</button>
      </div>
    </div>

  </div>

</div><!-- /device -->


<script>
  /* ══════════════════════════════════════════════════
     DECK CONFIGURATION
     ──────────────────────────────────────────────────
     In production this object will be fetched from:
       https://files.3c-public-library.org/CardGames/AurionDeck/deck.json

     For now it is hardcoded so the flow runs without
     any server. Replace the R2 URLs with your actual
     Canva exports once uploaded.

     Each card:
       front  → image the user sees when they pick a number
       back   → image revealed on flip (the message card)
  ══════════════════════════════════════════════════ */
  const DECK_CONFIG = {
    name:  "Aurion's Lucky Wisdom Deck",
    cards: [
      {
        id: 1,
        front: "https://files.3c-public-library.org/CardGames/AurionDeck/card-01-front.png",
        back:  "https://files.3c-public-library.org/CardGames/AurionDeck/card-01-back.png"
      },
      {
        id: 2,
        front: "https://files.3c-public-library.org/CardGames/AurionDeck/card-02-front.png",
        back:  "https://files.3c-public-library.org/CardGames/AurionDeck/card-02-back.png"
      },
      {
        id: 3,
        front: "https://files.3c-public-library.org/CardGames/AurionDeck/card-03-front.png",
        back:  "https://files.3c-public-library.org/CardGames/AurionDeck/card-03-back.png"
      },
      {
        id: 4,
        front: "https://files.3c-public-library.org/CardGames/AurionDeck/card-04-front.png",
        back:  "https://files.3c-public-library.org/CardGames/AurionDeck/card-04-back.png"
      },
      {
        id: 5,
        front: "https://files.3c-public-library.org/CardGames/AurionDeck/card-05-front.png",
        back:  "https://files.3c-public-library.org/CardGames/AurionDeck/card-05-back.png"
      },
      {
        id: 6,
        front: "https://files.3c-public-library.org/CardGames/AurionDeck/card-06-front.png",
        back:  "https://files.3c-public-library.org/CardGames/AurionDeck/card-06-back.png"
      },
      {
        id: 7,
        front: "https://files.3c-public-library.org/CardGames/AurionDeck/card-07-front.png",
        back:  "https://files.3c-public-library.org/CardGames/AurionDeck/card-07-back.png"
      }
    ]
  };

  /* ── STATE ──────────────────────────────────────── */
  let selectedCard = null;
  let isFlipped     = false;
  let currentScreen = 'screen-landing';

  /* ── SCREEN TRANSITION ──────────────────────────── */
  function goTo(targetId) {
    const from = document.getElementById(currentScreen);
    const to   = document.getElementById(targetId);
    if (!from || !to) return;

    from.classList.add('fade-out');
    setTimeout(() => {
      from.classList.remove('active', 'fade-out');
      to.classList.add('active');
      currentScreen = targetId;
    }, 450);
  }

  /* ── BUILD NUMBER BUTTONS ───────────────────────── */
  function buildNumberGrid() {
    const cards    = DECK_CONFIG.cards;
    const topRow   = document.getElementById('number-grid-top');
    const botRow   = document.getElementById('number-grid-bottom');
    topRow.innerHTML = '';
    botRow.innerHTML = '';

    cards.forEach((card, i) => {
      const btn = document.createElement('button');
      btn.className = 'num-btn';
      btn.innerHTML = `<span>${card.id}</span>`;

      // If you want to use a custom Canva image for the button face,
      // upload card-XX-number.png and uncomment:
      // btn.style.backgroundImage = `url(${card.numberImg})`;
      // btn.classList.add('has-image');

      btn.addEventListener('click', () => selectCard(card));

      // First 4 → top grid, rest → bottom row
      if (i < 4) {
        topRow.appendChild(btn);
      } else {
        botRow.appendChild(btn);
      }
    });
  }

  /* ── SELECT A CARD ──────────────────────────────── */
  function selectCard(card) {
    selectedCard = card;
    isFlipped    = false;

    // Load front image
    const frontEl = document.getElementById('cardFront');
    frontEl.innerHTML = '';
    const frontImg = new Image();
    frontImg.src = card.front;
    frontImg.alt = `Card ${card.id} Front`;
    frontEl.appendChild(frontImg);

    // Load back image
    const backEl = document.getElementById('cardBack');
    backEl.innerHTML = '';
    const backImg = new Image();
    backImg.src = card.back;
    backImg.alt = `Card ${card.id} Back`;
    backEl.appendChild(backImg);

    // Reset scene
    document.getElementById('cardScene').classList.remove('flipped');
    document.getElementById('tapHint').style.display = 'block';

    goTo('screen-card');
  }

  /* ── FLIP CARD ──────────────────────────────────── */
  function flipCard() {
    if (isFlipped) {
      // Already flipped — second tap goes to finale
      goTo('screen-finale');
      return;
    }
    isFlipped = true;
    document.getElementById('cardScene').classList.add('flipped');
    document.getElementById('tapHint').style.display = 'none';
  }

  /* ── RESET CARD STATE ───────────────────────────── */
  function resetCard() {
    isFlipped = false;
    selectedCard = null;
    document.getElementById('cardScene').classList.remove('flipped');
    document.getElementById('tapHint').style.display = 'block';
  }

  /* ── RESTART ────────────────────────────────────── */
  function restart() {
    resetCard();
    goTo('screen-landing');
  }

  /* ── CLOSE ──────────────────────────────────────── */
  function closeApp() {
    window.close();
    // Fallback if window.close() is blocked by browser:
    goTo('screen-landing');
  }

  /* ── INIT ───────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', () => {
    buildNumberGrid();

    /*
      PRODUCTION: fetch deck from R2 and override DECK_CONFIG:
      ─────────────────────────────────────────────────────────
      const DECK_URL = 'https://files.3c-public-library.org/CardGames/AurionDeck/deck.json';
      fetch(DECK_URL)
        .then(r => r.json())
        .then(data => {
          DECK_CONFIG.cards = data.cards;
          buildNumberGrid();
        })
        .catch(() => buildNumberGrid()); // fallback to hardcoded
    */
  });
</script>

</body>
</html>
