<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Aurion's Lucky Wisdom Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:," />

  <style>
    /* ── RESET ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    body {
      background: #1a0835;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    /* ── 9:16 PORTRAIT CONTAINER ────────────────── */
    .device {
      position: relative;
      width: min(390px, 56.25vh);
      height: min(844px, 100vh);
      aspect-ratio: 9 / 16;
      background: #3B1265;
      border-radius: clamp(0px, 2vw, 28px);
      overflow: hidden;
      box-shadow:
        0 0 0 1.5px rgba(200,169,110,0.35),
        0 30px 80px rgba(0,0,0,0.6);
    }

    @media (max-width: 480px) {
      body { align-items: flex-start; background: #3B1265; }
      .device {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
        aspect-ratio: unset;
      }
    }

    /* ── SCREENS ─────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .screen.active {
      display: flex;
      opacity: 1;
    }
    .screen.fading {
      opacity: 0;
      pointer-events: none;
    }

    /* ── MEDIA FILL ──────────────────────────────── */
    .media-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .media-wrap img,
    .media-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: absolute;
      inset: 0;
    }
    .media-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(20,4,50,0.08) 0%,
        rgba(20,4,50,0.55) 100%
      );
      z-index: 1;
    }
    .media-content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 8%;
    }

    /* ── BUTTONS ─────────────────────────────────── */
    .btn-gold {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.85rem, 2.5vw, 1.05rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #3B1265;
      background: linear-gradient(135deg, #E2C98A, #C8A96E);
      border: none;
      border-radius: 50px;
      padding: 14px 48px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(200,169,110,0.45);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .btn-gold:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(200,169,110,0.6); }
    .btn-gold:active { transform: scale(0.97); }

    .btn-outline {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.8rem, 2.2vw, 0.95rem);
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #E2C98A;
      background: transparent;
      border: 1.5px solid rgba(200,169,110,0.55);
      border-radius: 50px;
      padding: 12px 36px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s;
    }
    .btn-outline:hover { transform: translateY(-2px); border-color: #C8A96E; }

    /* ── SCREEN: LOADING ─────────────────────────── */
    #screen-loading {
      background: #1a0835;
      gap: 16px;
    }
    .loading-text {
      font-family: 'Cinzel', serif;
      color: #C8A96E;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      letter-spacing: 0.12em;
      animation: pulse 1.8s ease-in-out infinite;
    }

    /* ── SCREEN: ERROR ───────────────────────────── */
    #screen-error {
      background: #1a0835;
      padding: 32px;
      text-align: center;
      gap: 16px;
    }
    #screen-error strong {
      font-family: 'Cinzel', serif;
      color: #C8A96E;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
    }
    #screen-error p {
      color: rgba(255,255,255,0.6);
      font-size: clamp(0.75rem, 2vw, 0.88rem);
      line-height: 1.6;
    }

    /* ── SCREEN: INTRO ───────────────────────────── */
    #screen-intro {
      background: radial-gradient(ellipse at center, #5A2090 0%, #1a0835 100%);
    }

    /* ── SCREEN: PICK ────────────────────────────── */
    #screen-pick {
      background: #3B1265;
      padding: 6% 6% 5%;
      justify-content: flex-start;
    }
    .pick-logo {
      width: clamp(36px, 10%, 52px);
      margin-top: 4%;
      margin-bottom: 3%;
    }
    .pick-brand {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 1.8vw, 0.75rem);
      color: #00D4FF;
      letter-spacing: 0.12em;
      margin-bottom: 6%;
      text-align: center;
    }
    .pick-prompt-wrap {
      background: rgba(200,169,110,0.18);
      border: 1.5px solid #C8A96E;
      border-radius: 50px;
      padding: clamp(8px, 2%, 14px) clamp(24px, 8%, 40px);
      margin-bottom: 7%;
    }
    .pick-prompt {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.85rem, 2.8vw, 1.05rem);
      font-weight: 700;
      color: #00D4FF;
      letter-spacing: 0.15em;
      text-align: center;
    }
    .number-grid-top {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(8px, 3%, 14px);
      width: 100%;
      max-width: 320px;
      margin-bottom: clamp(8px, 3%, 14px);
    }
    .number-grid-bottom {
      display: flex;
      justify-content: center;
      gap: clamp(8px, 3%, 14px);
      width: 100%;
      max-width: 320px;
    }
    .num-btn {
      width: clamp(56px, 16vw, 68px);
      height: clamp(56px, 16vw, 68px);
      background: #00D4FF;
      border: none;
      border-radius: clamp(12px, 4vw, 18px);
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 900;
      color: #C8A96E;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,212,255,0.25);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }
    .num-btn:hover  { transform: translateY(-3px) scale(1.07); box-shadow: 0 8px 28px rgba(0,212,255,0.5); }
    .num-btn:active { transform: scale(0.95); }
    .num-btn.has-image span { display: none; }
    .pick-footer { margin-top: 7%; text-align: center; }
    .pick-title-block {
      font-family: 'Cinzel', serif;
      color: #C8A96E;
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      letter-spacing: 0.12em;
    }
    .pick-title-block span {
      display: block;
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.85rem, 2.8vw, 1.05rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: 0;
      margin-top: 4px;
    }

    /* ── SCREEN: CARD ────────────────────────────── */
    #screen-card {
      background: #000;
      perspective: 1200px;
    }
    .card-scene {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .card-scene.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }
    .card-face img,
    .card-face video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .card-face-front { background: radial-gradient(ellipse at center, #5A2090 0%, #2a0856 100%); }
    .card-face-back  { background: radial-gradient(ellipse at center, #3B1265 0%, #1a0835 100%); transform: rotateY(180deg); }
    .tap-hint {
      position: absolute;
      bottom: 6%;
      left: 0; right: 0;
      text-align: center;
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.7rem, 2vw, 0.82rem);
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.1em;
      animation: pulse 2.2s ease-in-out infinite;
      pointer-events: none;
      z-index: 5;
    }
    .next-btn-wrap {
      position: absolute;
      bottom: 6%;
      left: 0; right: 0;
      display: none;
      justify-content: center;
      z-index: 5;
    }
    .next-btn-wrap.visible { display: flex; }
    .card-back-btn {
      position: absolute;
      top: 4%;
      left: 5%;
      z-index: 10;
      background: rgba(200,169,110,0.22);
      border: 1px solid rgba(200,169,110,0.45);
      border-radius: 50px;
      padding: 6px 16px;
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.7rem, 2vw, 0.8rem);
      color: #E2C98A;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.06em;
    }
    .card-back-btn:hover { background: rgba(200,169,110,0.38); }

    /* ── SCREEN: FINALE ──────────────────────────── */
    #screen-finale {
      background: radial-gradient(ellipse at center, #5A2090 0%, #1a0835 100%);
    }
    .finale-buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.9; }
    }
  </style>
</head>
<body>

<div class="device" id="device">

  <!-- ── LOADING ──────────────────────────────────── -->
  <div class="screen active" id="screen-loading">
    <span class="loading-text">Loading…</span>
  </div>

  <!-- ── ERROR ────────────────────────────────────── -->
  <div class="screen" id="screen-error">
    <strong>Deck not found</strong>
    <p>This link may be invalid<br>or the deck has been removed.</p>
  </div>

  <!-- ══════════════════════════════════════════════
       SCREEN 1 — INTRO
       Reads: deck.intro (image or video URL)
       User sees the intro media, clicks LET'S START
  ══════════════════════════════════════════════ -->
  <div class="screen" id="screen-intro">
    <div class="media-wrap"    id="introMediaWrap"></div>
    <div class="media-overlay"></div>
    <div class="media-content">
      <button class="btn-gold" id="btnStart">LET'S START</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       SCREEN 2 — PICK A NUMBER
       Reads: deck.cards (id only, to build buttons)
       Buttons built once when screen first activates
  ══════════════════════════════════════════════ -->
  <div class="screen" id="screen-pick">
    <img
      class="pick-logo"
      src="https://files.3c-public-library.org/CardGames/logo.png"
      alt="3C"
      onerror="this.style.display='none'"
    />
    <p class="pick-brand">3C Thread To Success</p>
    <div class="pick-prompt-wrap">
      <p class="pick-prompt">PRESS A NUMBER</p>
    </div>
    <div class="number-grid-top"    id="numGridTop"></div>
    <div class="number-grid-bottom" id="numGridBottom"></div>
    <div class="pick-footer">
      <div class="pick-title-block" id="pickTitle">
        AURION'S
        <span id="pickSubTitle">Lucky Wisdom Deck Cards</span>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       SCREEN 3+4 — CARD
       Reads: deck.cards[n].front on card select
       Reads: deck.cards[n].back  on flip
       Nothing else is read on this screen
  ══════════════════════════════════════════════ -->
  <div class="screen" id="screen-card">
    <button class="card-back-btn" id="btnPickAgain">← Pick Again</button>
    <div class="card-scene" id="cardScene">
      <div class="card-face card-face-front" id="cardFront"></div>
      <div class="card-face card-face-back"  id="cardBack"></div>
    </div>
    <div class="tap-hint"     id="tapHint">TAP CARD TO REVEAL</div>
    <div class="next-btn-wrap" id="nextBtnWrap">
      <button class="btn-gold" id="btnNext">NEXT →</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       SCREEN 5 — FINALE
       Reads: deck.finale (image or video URL)
       Loaded only when this screen activates
  ══════════════════════════════════════════════ -->
  <div class="screen" id="screen-finale">
    <div class="media-wrap"    id="finaleMediaWrap"></div>
    <div class="media-overlay"></div>
    <div class="media-content">
      <div class="finale-buttons">
        <button class="btn-gold"    id="btnRestart">START AGAIN</button>
        <button class="btn-outline" id="btnClose">CLOSE</button>
      </div>
    </div>
  </div>

</div><!-- /device -->

<script>
/* ══════════════════════════════════════════════════
   3C Card Games — Public App
   ──────────────────────────────────────────────────

   ONE JSON file is fetched once on load and stored
   in memory as `deck`. Each screen then reads ONLY
   its own section from that object — nothing more.

   JSON structure:
   {
     "slug":   "deck.01",
     "title":  "Aurion's Lucky Wisdom Deck",
     "intro":  "https://...deck.01/intro.png",
     "finale": "https://...deck.01/finale.png",
     "cards": [
       { "id": 1,
         "front": "https://...deck.01/card-01-front.png",
         "back":  "https://...deck.01/card-01-back.png" },
       ...
     ]
   }

   Screen → JSON key read:
     screen-intro   → deck.intro   (media URL only)
     screen-pick    → deck.cards   (id array only)
     screen-card    → deck.cards[n].front  (on select)
                    → deck.cards[n].back   (on flip)
     screen-finale  → deck.finale  (media URL only)
══════════════════════════════════════════════════ */

  const R2_PUBLIC = 'https://files.3c-public-library.org/CardGames';

  /* ── STATE ────────────────────────────────────── */
  let deck          = null;   // full JSON — loaded once
  let selectedCard  = null;   // deck.cards[n]
  let isFlipped     = false;
  let finaleLoaded  = false;  // load finale media once only
  let currentScreen = 'screen-loading';

  /* ── HELPERS ──────────────────────────────────── */
  function getDeckSlug() {
    return new URLSearchParams(window.location.search).get('deck');
  }

  function isVideo(url) {
    return /\.(mp4|webm|mov|ogg)$/i.test(url || '');
  }

  /* ── SCREEN TRANSITION ────────────────────────── */
  function goTo(id) {
    const from = document.getElementById(currentScreen);
    const to   = document.getElementById(id);
    if (!from || !to || currentScreen === id) return;

    from.classList.add('fading');
    setTimeout(() => {
      from.classList.remove('active', 'fading');
      to.classList.add('active');
      currentScreen = id;
      onScreenActivate(id);
    }, 400);
  }

  /* ── SCREEN ACTIVATE — each screen reads its own
     section from the deck object when it activates.
     Nothing is read before the screen needs it.
  ─────────────────────────────────────────────── */
  function onScreenActivate(id) {
    switch (id) {

      /* INTRO: reads deck.intro only */
      case 'screen-intro':
        loadMedia('introMediaWrap', deck.intro);
        break;

      /* PICK: reads deck.cards id list only */
      case 'screen-pick':
        buildNumberGrid(deck.cards);
        document.getElementById('pickSubTitle').textContent = deck.title || 'Lucky Wisdom Deck Cards';
        break;

      /* CARD: nothing loaded here —
         card front is loaded on selectCard()
         card back is loaded on flipCard()       */
      case 'screen-card':
        break;

      /* FINALE: reads deck.finale only, once */
      case 'screen-finale':
        if (!finaleLoaded) {
          loadMedia('finaleMediaWrap', deck.finale);
          finaleLoaded = true;
        }
        break;
    }
  }

  /* ── LOAD MEDIA INTO A WRAP CONTAINER ────────── */
  /*
    Injects <img> or <video> into the named wrap div.
    object-fit:cover fills the 9:16 container exactly.
    Called only when the screen that needs it activates.
  */
  function loadMedia(wrapId, url) {
    const wrap = document.getElementById(wrapId);
    if (!wrap || !url || wrap.children.length > 0) return;

    if (isVideo(url)) {
      const v  = document.createElement('video');
      v.autoplay    = true;
      v.muted       = true;
      v.loop        = true;
      v.playsInline = true;
      const s  = document.createElement('source');
      s.src    = url;
      s.type   = 'video/mp4';
      v.appendChild(s);
      wrap.appendChild(v);
    } else {
      const img = document.createElement('img');
      img.src   = url;
      img.alt   = '';
      wrap.appendChild(img);
    }
  }

  /* ── BUILD NUMBER GRID ────────────────────────── */
  /* Reads deck.cards id only — not front/back yet */
  function buildNumberGrid(cards) {
    const topEl = document.getElementById('numGridTop');
    const botEl = document.getElementById('numGridBottom');
    if (topEl.children.length > 0) return; // already built

    cards.forEach((card, i) => {
      const btn = document.createElement('button');
      btn.className = 'num-btn';
      btn.innerHTML = `<span>${card.id}</span>`;
      btn.addEventListener('click', () => selectCard(card));
      if (i < 4) topEl.appendChild(btn);
      else        botEl.appendChild(btn);
    });
  }

  /* ── SELECT CARD ──────────────────────────────── */
  /* Reads deck.cards[n].front only */
  function selectCard(card) {
    selectedCard = card;
    isFlipped    = false;

    const scene = document.getElementById('cardScene');
    scene.classList.remove('flipped');
    document.getElementById('tapHint').style.display = 'block';
    document.getElementById('nextBtnWrap').classList.remove('visible');

    // Load FRONT face now
    const frontEl = document.getElementById('cardFront');
    frontEl.innerHTML = '';
    loadFaceMedia(frontEl, card.front);

    // Pre-clear back — loaded on flip
    document.getElementById('cardBack').innerHTML = '';

    goTo('screen-card');
  }

  /* ── FLIP CARD ────────────────────────────────── */
  /* Reads deck.cards[n].back only — at flip moment */
  function flipCard() {
    if (isFlipped) return;
    isFlipped = true;

    // Load BACK face now (not before)
    const backEl = document.getElementById('cardBack');
    if (backEl.children.length === 0 && selectedCard) {
      loadFaceMedia(backEl, selectedCard.back);
    }

    document.getElementById('cardScene').classList.add('flipped');
    document.getElementById('tapHint').style.display = 'none';
    document.getElementById('nextBtnWrap').classList.add('visible');
  }

  /* ── LOAD MEDIA INTO A CARD FACE ──────────────── */
  function loadFaceMedia(faceEl, url) {
    if (!url) return;
    if (isVideo(url)) {
      const v  = document.createElement('video');
      v.autoplay    = true;
      v.muted       = true;
      v.loop        = true;
      v.playsInline = true;
      const s  = document.createElement('source');
      s.src    = url;
      s.type   = 'video/mp4';
      v.appendChild(s);
      faceEl.appendChild(v);
    } else {
      const img = new Image();
      img.src   = url;
      faceEl.appendChild(img);
    }
  }

  /* ── RESET ────────────────────────────────────── */
  function resetCard() {
    isFlipped    = false;
    selectedCard = null;
    document.getElementById('cardScene').classList.remove('flipped');
    document.getElementById('cardFront').innerHTML = '';
    document.getElementById('cardBack').innerHTML  = '';
    document.getElementById('tapHint').style.display = 'block';
    document.getElementById('nextBtnWrap').classList.remove('visible');
  }

  /* ── WIRE BUTTONS ─────────────────────────────── */
  function wireButtons() {
    // LET'S START → pick screen
    document.getElementById('btnStart').onclick = () => goTo('screen-pick');

    // Card scene tap → flip
    document.getElementById('cardScene').onclick = flipCard;

    // Pick Again
    document.getElementById('btnPickAgain').onclick = () => {
      resetCard();
      goTo('screen-pick');
    };

    // NEXT → finale
    document.getElementById('btnNext').onclick = () => goTo('screen-finale');

    // START AGAIN → intro
    document.getElementById('btnRestart').onclick = () => {
      resetCard();
      finaleLoaded = false;
      document.getElementById('finaleMediaWrap').innerHTML = '';
      goTo('screen-intro');
    };

    // CLOSE
    document.getElementById('btnClose').onclick = () => {
      window.close();
      setTimeout(() => {
        window.location.href =
          `../landing.html?deck=${encodeURIComponent(getDeckSlug())}`;
      }, 300);
    };
  }

  /* ── INIT ─────────────────────────────────────── */
  /*
    1. Fetch ONE JSON file
    2. Store in memory as `deck`
    3. Wire buttons
    4. Activate intro screen — which reads deck.intro only
    Everything else is lazy-loaded per screen.
  */
  async function init() {
    const slug = getDeckSlug();
    if (!slug) {
      goTo('screen-error');
      return;
    }

    try {
      const res = await fetch(
        `${R2_PUBLIC}/${slug}/deck.json`
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      deck = await res.json();

      wireButtons();
      goTo('screen-intro'); // triggers onScreenActivate → loads deck.intro only

    } catch (err) {
      console.error('Deck load failed:', err);
      goTo('screen-error');
    }
  }

  document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
