<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Aurion's Lucky Wisdom Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:," />

  <style>
    /* ── RESET ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    body {
      background: #1a0835;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    /* ── 9:16 PORTRAIT CONTAINER ────────────────────
       Desktop: fits within viewport maintaining 9:16.
       Mobile: fills full screen exactly.
    ──────────────────────────────────────────────── */
    .device {
      position: relative;
      /* 9:16 enforced via aspect-ratio + height constraint */
      width: min(390px, 56.25vh);
      height: min(844px, 100vh);
      aspect-ratio: 9 / 16;
      background: #3B1265;
      border-radius: clamp(0px, 2vw, 28px);
      overflow: hidden;
      box-shadow:
        0 0 0 1.5px rgba(200,169,110,0.35),
        0 30px 80px rgba(0,0,0,0.6);
    }

    @media (max-width: 480px) {
      body { align-items: flex-start; background: #3B1265; }
      .device {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
        aspect-ratio: unset;
      }
    }

    /* ── SCREENS ────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .screen.active {
      display: flex;
      opacity: 1;
    }
    .screen.fading {
      opacity: 0;
      pointer-events: none;
    }

    /* ── MEDIA FILL ─────────────────────────────────
       Image or video fills container exactly — no gaps,
       no distortion. object-fit: cover is the key.
    ──────────────────────────────────────────────── */
    .media-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .media-wrap img,
    .media-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: absolute;
      inset: 0;
    }
    .media-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(20,4,50,0.10) 0%,
        rgba(20,4,50,0.55) 100%
      );
      z-index: 1;
    }
    /* Content above media */
    .media-content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 8%;
    }

    /* ── BUTTONS ─────────────────────────────────── */
    .btn-gold {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.85rem, 2.5vw, 1.05rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #3B1265;
      background: linear-gradient(135deg, #E2C98A, #C8A96E);
      border: none;
      border-radius: 50px;
      padding: 14px 48px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(200,169,110,0.45);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .btn-gold:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(200,169,110,0.6); }
    .btn-gold:active { transform: scale(0.97); }

    .btn-outline {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.8rem, 2.2vw, 0.95rem);
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #E2C98A;
      background: transparent;
      border: 1.5px solid rgba(200,169,110,0.55);
      border-radius: 50px;
      padding: 12px 36px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s;
    }
    .btn-outline:hover { transform: translateY(-2px); border-color: #C8A96E; }

    /* ════════════════════════════════════════════════
       SCREEN 1 — LANDING (image/video from R2)
       Handled by landing.html — public/index.html
       receives ?deck= and starts from screen-intro
    ════════════════════════════════════════════════ */

    /* ════════════════════════════════════════════════
       SCREEN 1 — INTRO (Let's Start)
       Image/video background from deck.landing R2 URL
    ════════════════════════════════════════════════ */
    #screen-intro {
      background: radial-gradient(ellipse at center, #5A2090 0%, #1a0835 100%);
    }

    /* ════════════════════════════════════════════════
       SCREEN 2 — PICK A NUMBER
    ════════════════════════════════════════════════ */
    #screen-pick {
      background: #3B1265;
      padding: 6% 6% 5%;
      gap: 0;
      justify-content: flex-start;
    }

    .pick-logo {
      width: clamp(36px, 10%, 52px);
      margin-top: 4%;
      margin-bottom: 3%;
    }

    .pick-brand {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.6rem, 1.8vw, 0.75rem);
      color: #00D4FF;
      letter-spacing: 0.12em;
      margin-bottom: 6%;
      text-align: center;
    }

    .pick-prompt-wrap {
      background: rgba(200,169,110,0.18);
      border: 1.5px solid #C8A96E;
      border-radius: 50px;
      padding: clamp(8px, 2%, 14px) clamp(24px, 8%, 40px);
      margin-bottom: 7%;
    }

    .pick-prompt {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.85rem, 2.8vw, 1.05rem);
      font-weight: 700;
      color: #00D4FF;
      letter-spacing: 0.15em;
      text-align: center;
    }

    /* Number grid — 4 top, 3 bottom centred */
    .number-grid-top {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(8px, 3%, 14px);
      width: 100%;
      max-width: 320px;
      margin-bottom: clamp(8px, 3%, 14px);
    }

    .number-grid-bottom {
      display: flex;
      justify-content: center;
      gap: clamp(8px, 3%, 14px);
      width: 100%;
      max-width: 320px;
    }

    .num-btn {
      width: clamp(56px, 16vw, 68px);
      height: clamp(56px, 16vw, 68px);
      background: #00D4FF;
      border: none;
      border-radius: clamp(12px, 4vw, 18px);
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 900;
      color: #C8A96E;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,212,255,0.25);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }
    .num-btn:hover  { transform: translateY(-3px) scale(1.07); box-shadow: 0 8px 28px rgba(0,212,255,0.5); }
    .num-btn:active { transform: scale(0.95); }
    .num-btn.has-image span { display: none; }

    .pick-footer {
      margin-top: 7%;
      text-align: center;
    }
    .pick-title-block {
      font-family: 'Cinzel', serif;
      color: #C8A96E;
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      letter-spacing: 0.12em;
    }
    .pick-title-block span {
      display: block;
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.85rem, 2.8vw, 1.05rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: 0;
      margin-top: 4px;
    }

    /* ════════════════════════════════════════════════
       SCREEN 3+4 — CARD (FRONT → FLIP → BACK)
    ════════════════════════════════════════════════ */
    #screen-card {
      background: #000;
      perspective: 1200px;
    }

    .card-scene {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .card-scene.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }
    .card-face img,
    .card-face video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .card-face-front { background: radial-gradient(ellipse at center, #5A2090 0%, #2a0856 100%); }
    .card-face-back  { background: radial-gradient(ellipse at center, #3B1265 0%, #1a0835 100%); transform: rotateY(180deg); }

    /* Tap hint on front */
    .tap-hint {
      position: absolute;
      bottom: 6%;
      left: 0; right: 0;
      text-align: center;
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.7rem, 2vw, 0.82rem);
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.1em;
      animation: pulse 2.2s ease-in-out infinite;
      pointer-events: none;
      z-index: 5;
    }

    /* NEXT button shown after flip */
    .next-btn-wrap {
      position: absolute;
      bottom: 6%;
      left: 0; right: 0;
      display: none;
      justify-content: center;
      z-index: 5;
    }
    .next-btn-wrap.visible { display: flex; }

    /* Back to pick */
    .card-back-btn {
      position: absolute;
      top: 4%;
      left: 5%;
      z-index: 10;
      background: rgba(200,169,110,0.22);
      border: 1px solid rgba(200,169,110,0.45);
      border-radius: 50px;
      padding: 6px 16px;
      font-family: 'Lato', sans-serif;
      font-size: clamp(0.7rem, 2vw, 0.8rem);
      color: #E2C98A;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.06em;
    }
    .card-back-btn:hover { background: rgba(200,169,110,0.38); }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.9; }
    }

    /* ════════════════════════════════════════════════
       SCREEN 5 — FINALE
    ════════════════════════════════════════════════ */
    #screen-finale {
      background: radial-gradient(ellipse at center, #5A2090 0%, #1a0835 100%);
    }

    .finale-buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── LOADING ──────────────────────────────────── */
    #screen-loading {
      background: #1a0835;
      gap: 16px;
    }
    .loading-text {
      font-family: 'Cinzel', serif;
      color: #C8A96E;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      animation: pulse 1.8s ease-in-out infinite;
    }

    /* ── ERROR ────────────────────────────────────── */
    #screen-error {
      background: #1a0835;
      padding: 32px;
      text-align: center;
      gap: 16px;
    }
    #screen-error strong { font-family: 'Cinzel', serif; color: #C8A96E; font-size: 1rem; }
    #screen-error p      { color: rgba(255,255,255,0.6); font-size: 0.85rem; line-height: 1.6; }

  </style>
</head>
<body>

<div class="device" id="device">

  <!-- ── LOADING ──────────────────────────────────── -->
  <div class="screen active" id="screen-loading">
    <span class="loading-text">Loading deck…</span>
  </div>

  <!-- ── ERROR ────────────────────────────────────── -->
  <div class="screen" id="screen-error">
    <strong>Deck not found</strong>
    <p>This link may be invalid or the deck has been removed.</p>
  </div>

  <!-- ════════════════════════════════════════════════
       SCREEN 1 — INTRO (Let's Start)
       Background: deck.landing R2 image or video
       ENTER was on landing.html — this is the next step
  ════════════════════════════════════════════════ -->
  <div class="screen" id="screen-intro">
    <div class="media-wrap" id="introMedia"></div>
    <div class="media-overlay"></div>
    <div class="media-content">
      <button class="btn-gold" id="btnStart">LET'S START</button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════
       SCREEN 2 — PICK A NUMBER
  ════════════════════════════════════════════════ -->
  <div class="screen" id="screen-pick">

    <img
      class="pick-logo"
      src="https://files.3c-public-library.org/CardGames/logo.png"
      alt="3C Logo"
      onerror="this.style.display='none'"
    />
    <p class="pick-brand">3C Thread To Success</p>

    <div class="pick-prompt-wrap">
      <p class="pick-prompt">PRESS A NUMBER</p>
    </div>

    <div class="number-grid-top" id="numGridTop"></div>
    <div class="number-grid-bottom" id="numGridBottom"></div>

    <div class="pick-footer">
      <div class="pick-title-block" id="pickDeckTitle">
        AURION'S
        <span>Lucky Wisdom<br>Deck Cards</span>
      </div>
    </div>

  </div>

  <!-- ════════════════════════════════════════════════
       SCREEN 3+4 — CARD (FRONT → FLIP → BACK)
  ════════════════════════════════════════════════ -->
  <div class="screen" id="screen-card">

    <button class="card-back-btn" id="btnPickAgain">← Pick Again</button>

    <div class="card-scene" id="cardScene" onclick="handleCardTap()">
      <div class="card-face card-face-front" id="cardFront"></div>
      <div class="card-face card-face-back"  id="cardBack"></div>
    </div>

    <div class="tap-hint" id="tapHint">TAP CARD TO REVEAL</div>

    <div class="next-btn-wrap" id="nextBtnWrap">
      <button class="btn-gold" id="btnNext">NEXT →</button>
    </div>

  </div>

  <!-- ════════════════════════════════════════════════
       SCREEN 5 — FINALE
       Background: deck.finale R2 image or video
  ════════════════════════════════════════════════ -->
  <div class="screen" id="screen-finale">
    <div class="media-wrap" id="finaleMedia"></div>
    <div class="media-overlay"></div>
    <div class="media-content">
      <div class="finale-buttons">
        <button class="btn-gold"    id="btnRestart">START AGAIN</button>
        <button class="btn-outline" id="btnClose">CLOSE</button>
      </div>
    </div>
  </div>

</div><!-- /device -->

<script>
/* ══════════════════════════════════════════════════
   3C Card Games — Public App
   ──────────────────────────────────────────────────
   Flow:
     screen-loading → screen-intro → screen-pick
     → screen-card (front) → screen-card (flipped)
     → screen-finale

   Deck JSON fetched from R2:
     https://files.3c-public-library.org/CardGames/{slug}/deck.json
══════════════════════════════════════════════════ */

const R2_PUBLIC = 'https://files.3c-public-library.org/CardGames';

/* ── STATE ──────────────────────────────────────── */
let deckData     = null;
let selectedCard = null;
let isFlipped    = false;
let currentScreen = 'screen-loading';

/* ── HELPERS ────────────────────────────────────── */
function getDeckSlug() {
  return new URLSearchParams(window.location.search).get('deck');
}

function isVideo(url) {
  return /\.(mp4|webm|mov|ogg)$/i.test(url || '');
}

function pad(n) { return String(n).padStart(2, '0'); }

/* ── SCREEN TRANSITION ──────────────────────────── */
function goTo(id) {
  const from = document.getElementById(currentScreen);
  const to   = document.getElementById(id);
  if (!from || !to || currentScreen === id) return;

  from.classList.add('fading');
  setTimeout(() => {
    from.classList.remove('active', 'fading');
    to.classList.add('active');
    currentScreen = id;
  }, 400);
}

/* ── INJECT MEDIA ───────────────────────────────── */
/*
  Injects an <img> or <video> into a .media-wrap container.
  Image/video fills the 9:16 container via object-fit:cover.
*/
function injectMedia(containerId, url) {
  const wrap = document.getElementById(containerId);
  if (!wrap || !url) return;
  wrap.innerHTML = '';

  if (isVideo(url)) {
    const v = document.createElement('video');
    v.autoplay   = true;
    v.muted      = true;
    v.loop       = true;
    v.playsInline = true;
    const s = document.createElement('source');
    s.src  = url;
    s.type = 'video/mp4';
    v.appendChild(s);
    wrap.appendChild(v);
  } else {
    const img = document.createElement('img');
    img.src = url;
    img.alt = '';
    wrap.appendChild(img);
  }
}

/* ── BUILD NUMBER GRID ──────────────────────────── */
function buildNumberGrid(cards) {
  const topEl = document.getElementById('numGridTop');
  const botEl = document.getElementById('numGridBottom');
  topEl.innerHTML = '';
  botEl.innerHTML = '';

  cards.forEach((card, i) => {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.innerHTML = `<span>${card.id}</span>`;
    btn.addEventListener('click', () => selectCard(card));
    if (i < 4) topEl.appendChild(btn);
    else        botEl.appendChild(btn);
  });
}

/* ── SELECT CARD ────────────────────────────────── */
function selectCard(card) {
  selectedCard = card;
  isFlipped    = false;

  // Reset scene
  const scene = document.getElementById('cardScene');
  scene.classList.remove('flipped');
  document.getElementById('tapHint').style.display   = 'block';
  document.getElementById('nextBtnWrap').classList.remove('visible');

  // Load front face
  const frontEl = document.getElementById('cardFront');
  frontEl.innerHTML = '';
  if (isVideo(card.front)) {
    const v = document.createElement('video');
    v.autoplay = true; v.muted = true; v.loop = true; v.playsInline = true;
    const s = document.createElement('source'); s.src = card.front; s.type = 'video/mp4';
    v.appendChild(s); frontEl.appendChild(v);
  } else {
    const img = new Image(); img.src = card.front; frontEl.appendChild(img);
  }

  // Load back face
  const backEl = document.getElementById('cardBack');
  backEl.innerHTML = '';
  if (isVideo(card.back)) {
    const v = document.createElement('video');
    v.autoplay = true; v.muted = true; v.loop = true; v.playsInline = true;
    const s = document.createElement('source'); s.src = card.back; s.type = 'video/mp4';
    v.appendChild(s); backEl.appendChild(v);
  } else {
    const img = new Image(); img.src = card.back; backEl.appendChild(img);
  }

  goTo('screen-card');
}

/* ── HANDLE CARD TAP ────────────────────────────── */
function handleCardTap() {
  if (isFlipped) return; // already flipped — use NEXT button
  isFlipped = true;
  document.getElementById('cardScene').classList.add('flipped');
  document.getElementById('tapHint').style.display = 'none';
  document.getElementById('nextBtnWrap').classList.add('visible');
}

/* ── WIRE BUTTONS ───────────────────────────────── */
function wireButtons() {
  document.getElementById('btnStart').onclick = () => goTo('screen-pick');

  document.getElementById('btnPickAgain').onclick = () => {
    isFlipped    = false;
    selectedCard = null;
    document.getElementById('cardScene').classList.remove('flipped');
    document.getElementById('tapHint').style.display = 'block';
    document.getElementById('nextBtnWrap').classList.remove('visible');
    goTo('screen-pick');
  };

  document.getElementById('btnNext').onclick = () => goTo('screen-finale');

  document.getElementById('btnRestart').onclick = () => {
    isFlipped    = false;
    selectedCard = null;
    goTo('screen-intro');
  };

  document.getElementById('btnClose').onclick = () => {
    // Try to close tab; fallback to landing.html
    window.close();
    setTimeout(() => {
      window.location.href = `../landing.html?deck=${getDeckSlug()}`;
    }, 300);
  };
}

/* ── LOAD DECK ──────────────────────────────────── */
async function loadDeck(slug) {
  try {
    const res = await fetch(`${R2_PUBLIC}/${slug}/deck.json`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    deckData = await res.json();

    // Inject landing media into intro screen
    if (deckData.landing) {
      injectMedia('introMedia', deckData.landing);
    }

    // Inject finale media
    if (deckData.finale) {
      injectMedia('finaleMedia', deckData.finale);
    }

    // Update pick screen title
    const titleEl = document.getElementById('pickDeckTitle');
    if (titleEl && deckData.title) {
      titleEl.innerHTML = `AURION'S<span>${deckData.title}</span>`;
    }

    // Build number grid
    buildNumberGrid(deckData.cards || []);

    // Wire all buttons
    wireButtons();

    // Go to intro
    goTo('screen-intro');

  } catch (err) {
    console.error('Deck load failed:', err);
    goTo('screen-error');
  }
}

/* ── INIT ───────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  const slug = getDeckSlug();
  if (!slug) {
    goTo('screen-error');
    return;
  }
  loadDeck(slug);
});
</script>

</body>
</html>
