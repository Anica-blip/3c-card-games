<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>3C Card Game Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:," />

  <style>
    /* ── RESET ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    body {
      background: #1a0835;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Open Sans', sans-serif;
      overflow: hidden;
    }

    /* ══════════════════════════════════════════════════
       THE DEVICE FRAME
       This never changes — same container on every screen.
       9:16 portrait, gold border, rounded corners.
       All screens sit inside this frame.
    ══════════════════════════════════════════════════ */
    .device {
      position: relative;
      width: min(390px, 56.25vh);
      height: min(844px, 100vh);
      aspect-ratio: 9 / 16;
      background: #3B1265;
      border-radius: clamp(0px, 2vw, 28px);
      overflow: hidden;
      box-shadow:
        0 0 0 2px rgba(200,169,110,0.6),
        0 0 0 4px rgba(200,169,110,0.15),
        0 30px 80px rgba(0,0,0,0.7);
    }

    /* Mobile: Keep 9:16 container with borders visible */
    @media (max-width: 480px) {
      .device {
        width: 95vw;
        height: auto;
        max-height: 95vh;
        aspect-ratio: 9 / 16;
      }
    }

    /* ── SCREENS ─────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .screen.active {
      display: flex;
      opacity: 1;
    }
    .screen.fading {
      opacity: 0;
      pointer-events: none;
    }

    /* ── MEDIA FILL (image or video fills frame) ───────
       Used on: Intro, Card front/back, Finale
       object-fit:cover — always fills, never distorts
    ─────────────────────────────────────────────────── */
    .media-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .media-wrap img,
    .media-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: absolute;
      inset: 0;
    }

    /* Soft gradient so buttons stay readable */
    .media-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(20,4,50,0.05) 0%,
        rgba(20,4,50,0.60) 100%
      );
      z-index: 1;
    }

    /* Content layer — sits above media */
    .media-content {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 8%;
    }

    /* ── BUTTONS ─────────────────────────────────────── */
    /* Gold pill — used on Intro (LET'S GO), card NEXT */
    .btn-gold {
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #3B1265;
      background: linear-gradient(135deg, #E2C98A, #C8A96E);
      border: none;
      border-radius: 50px;
      padding: 14px 52px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(200,169,110,0.5);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }
    .btn-gold:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(200,169,110,0.65); }
    .btn-gold:active { transform: scale(0.96); }

    /* Gold outline — used on finale BACK / CLOSE */
    .btn-outline {
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.8rem, 2.2vw, 0.92rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #E2C98A;
      background: rgba(200,169,110,0.10);
      border: 1.5px solid rgba(200,169,110,0.55);
      border-radius: 50px;
      padding: 12px 36px;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s, background 0.16s;
    }
    .btn-outline:hover {
      transform: translateY(-2px);
      border-color: #C8A96E;
      background: rgba(200,169,110,0.20);
    }

    /* ── LOADING ─────────────────────────────────────── */
    #screen-loading {
      background: #1a0835;
    }
    .loading-text {
      font-family: 'Cinzel', serif;
      color: #C8A96E;
      font-size: clamp(0.75rem, 2vw, 0.88rem);
      letter-spacing: 0.12em;
      animation: pulse 1.8s ease-in-out infinite;
    }

    /* ── ERROR ───────────────────────────────────────── */
    #screen-error {
      background: #1a0835;
      padding: 32px;
      text-align: center;
      gap: 14px;
    }
    #screen-error strong {
      font-family: 'Cinzel', serif;
      color: #C8A96E;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
    }
    #screen-error p {
      color: rgba(255,255,255,0.55);
      font-size: clamp(0.75rem, 2vw, 0.85rem);
      line-height: 1.6;
    }

    /* ══════════════════════════════════════════════════
       SCREEN: INTRO
       Full media fill — same as landing page feel
       Button: LET'S GO at bottom
    ══════════════════════════════════════════════════ */
    #screen-intro {
      background: radial-gradient(ellipse at center, #5A2090 0%, #1a0835 100%);
    }

    /* ══════════════════════════════════════════════════
       SCREEN: PICK A NUMBER
       Purple branded background (not media fill)
       Square neon gold number buttons
       Same frame — branded content inside
    ══════════════════════════════════════════════════ */
    #screen-pick {
      background: #1a0a2e;
      justify-content: space-between;
      padding: 0 6% 3%;
      gap: 0;
      align-items: center;
    }

    .pick-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 5%;
    }

    .pick-logo {
      width: clamp(32px, 8%, 44px);
      margin-bottom: 2%;
    }

    .pick-brand {
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.6rem, 1.8vw, 0.75rem);
      color: #00D4FF;
      letter-spacing: 0.12em;
      margin-bottom: 5%;
      text-align: center;
    }

    /* PRESS A NUMBER pill */
    .pick-prompt-wrap {
      background: rgba(200,169,110,0.14);
      border: 1.5px solid #C8A96E;
      border-radius: 50px;
      padding: clamp(8px, 2%, 12px) clamp(20px, 7%, 36px);
      margin-bottom: 6%;
    }
    .pick-prompt {
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.82rem, 2.6vw, 1rem);
      font-weight: 700;
      color: #00D4FF;
      letter-spacing: 0.08em;
      text-align: center;
    }

    /* Number grids — centred (3-3-1 layout) */
    .number-grid-top {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(10px, 3%, 14px);
      width: 100%;
      max-width: 280px;
      margin-bottom: clamp(10px, 3%, 14px);
    }
    .number-grid-middle {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(10px, 3%, 14px);
      width: 100%;
      max-width: 280px;
      margin-bottom: clamp(10px, 3%, 14px);
    }
    .number-grid-bottom {
      display: flex;
      justify-content: center;
      gap: clamp(10px, 3%, 14px);
      width: 100%;
      max-width: 280px;
    }

    /* ── GOLD NUMBER BUTTONS ─────────────────────────── */
    .num-btn {
      width: clamp(56px, 15vw, 62px);
      height: clamp(56px, 15vw, 62px);
      background: rgba(200,169,110,0.14);
      border: 2px solid #C8A96E;
      border-radius: 10px;
      font-family: 'Open Sans', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: #E2C98A;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.16s ease;
      box-shadow:
        0 0 16px rgba(200,169,110,0.4),
        0 0 32px rgba(200,169,110,0.15),
        inset 0 0 12px rgba(200,169,110,0.08);
    }

    .num-btn:hover {
      background: rgba(226,201,138,0.22);
      border-color: #E2C98A;
      color: #fff;
      box-shadow:
        0 0 24px rgba(200,169,110,0.65),
        0 0 48px rgba(200,169,110,0.25),
        inset 0 0 16px rgba(200,169,110,0.12);
      transform: translateY(-2px);
    }

    .num-btn:active,
    .num-btn.selected {
      background: linear-gradient(135deg, #E2C98A, #C8A96E);
      border-color: #E2C98A;
      color: #3B1265;
      box-shadow:
        0 0 32px rgba(200,169,110,0.85),
        0 0 64px rgba(200,169,110,0.35);
      transform: scale(0.95);
    }

    /* Hide number when custom image button is used */
    .num-btn.has-image span { display: none; }

    .pick-center-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .pick-footer {
      margin-top: 5%;
      text-align: center;
      padding: 0 8%;
    }

    .pick-instruction {
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.75rem, 2vw, 0.85rem);
      font-weight: 400;
      color: rgba(226,201,138,0.70);
      text-align: center;
      line-height: 1.6;
    }

    /* Watermark — bottom of pick screen only */
    .pick-watermark {
      position: absolute;
      bottom: 10px;
      left: 0; right: 0;
      text-align: center;
      font-family: 'Open Sans', sans-serif;
      font-size: 9px;
      color: rgba(200,169,110,0.30);
      letter-spacing: 0.03em;
      padding: 0 12px;
      line-height: 1.4;
      pointer-events: none;
    }

    /* ══════════════════════════════════════════════════
       SCREEN: CARD (FRONT → TAP → FLIP → BACK)
       Card fills entire frame — no background visible
       Tap hint pulses until flip
       NEXT button appears after flip
    ══════════════════════════════════════════════════ */
    #screen-card {
      background: #0a0614;
      perspective: 1200px;
    }

    .card-scene {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .card-scene.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }
    .card-face img,
    .card-face video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .card-face-front { background: #2a0856; }
    .card-face-back  { background: #1a0835; transform: rotateY(180deg); }

    /* Tap hint */
    .tap-hint {
      position: absolute;
      bottom: 6%;
      left: 0; right: 0;
      text-align: center;
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.68rem, 1.8vw, 0.8rem);
      color: rgba(255,255,255,0.50);
      letter-spacing: 0.1em;
      animation: pulse 2.2s ease-in-out infinite;
      pointer-events: none;
      z-index: 5;
    }

    /* NEXT button — appears after flip, pushed to bottom */
    .next-btn-wrap {
      position: absolute;
      bottom: 3%;
      left: 0; right: 0;
      display: none;
      justify-content: center;
      z-index: 5;
    }
    .next-btn-wrap.visible { display: flex; }

    /* Back to pick */
    .card-back-btn {
      position: absolute;
      top: 3%;
      left: 4%;
      z-index: 10;
      background: rgba(200,169,110,0.18);
      border: 1px solid rgba(200,169,110,0.40);
      border-radius: 50px;
      padding: 6px 16px;
      font-family: 'Open Sans', sans-serif;
      font-size: clamp(0.68rem, 1.8vw, 0.78rem);
      font-weight: 600;
      color: #E2C98A;
      cursor: pointer;
      transition: background 0.18s;
      letter-spacing: 0.05em;
    }
    .card-back-btn:hover { background: rgba(200,169,110,0.32); }

    /* Mobile: Maintain 9:16 aspect ratio with borders */

    /* ══════════════════════════════════════════════════
       SCREEN: FINALE
       Video fills frame
       BACK (to intro) + CLOSE buttons at bottom
    ══════════════════════════════════════════════════ */
    #screen-finale {
      background: #1a0835;
    }

    .finale-buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── ANIMATIONS ──────────────────────────────────── */
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.85; }
    }

  </style>
</head>
<body>

<div class="device" id="device">

  <!-- ── LOADING ────────────────────────────────────── -->
  <div class="screen active" id="screen-loading">
    <span class="loading-text">Loading…</span>
  </div>

  <!-- ── ERROR ──────────────────────────────────────── -->
  <div class="screen" id="screen-error">
    <strong>Deck not found</strong>
    <p>This link may be invalid<br>or the deck has been removed.</p>
  </div>

  <!-- ════════════════════════════════════════════════
       INTRO SCREEN
       Media fills frame — same container, same gold border
       Button: LET'S GO
  ════════════════════════════════════════════════ -->
  <div class="screen" id="screen-intro">
    <div class="media-wrap"    id="introMediaWrap"></div>
    <div class="media-overlay"></div>
    <div class="media-content">
      <button class="btn-gold" id="btnStart">LET'S GO</button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════
       PICK A NUMBER SCREEN
       Branded purple — square neon number buttons
       Same frame, same gold border
  ════════════════════════════════════════════════ -->
  <div class="screen" id="screen-pick">

    <div class="pick-header">
      <img
        class="pick-logo"
        src="https://files.3c-public-library.org/CardGames/logo.png"
        alt="3C"
        onerror="this.style.display='none'"
      />
      <p class="pick-brand">3C Thread To Success</p>
    </div>

    <div class="pick-center-section">
      <div class="pick-prompt-wrap">
        <p class="pick-prompt">PRESS A NUMBER</p>
      </div>

      <!-- 3-3-1 layout: buttons 1-3, 4-6, 7 -->
      <div class="number-grid-top"    id="numGridTop"></div>
      <div class="number-grid-middle" id="numGridMiddle"></div>
      <div class="number-grid-bottom" id="numGridBottom"></div>

      <div class="pick-footer">
        <p class="pick-instruction">Go ahead — choose any number<br>to see your results</p>
      </div>
    </div>

    <p class="pick-watermark">Designed &amp; built with ❤️ by Claude (Anthropic) × Chef Anica · 3C Thread To Success Cooking Lab 🧪👨‍🍳</p>

  </div>

  <!-- ════════════════════════════════════════════════
       CARD SCREEN
       Card front fills frame → tap → flips to back
       NEXT appears after flip
  ════════════════════════════════════════════════ -->
  <div class="screen" id="screen-card">

    <button class="card-back-btn" id="btnPickAgain">← Pick Again</button>

    <div class="card-scene" id="cardScene">
      <div class="card-face card-face-front" id="cardFront"></div>
      <div class="card-face card-face-back"  id="cardBack"></div>
    </div>

    <div class="tap-hint"      id="tapHint">TAP CARD TO REVEAL</div>

    <div class="next-btn-wrap" id="nextBtnWrap">
      <button class="btn-gold" id="btnNext">NEXT →</button>
    </div>

  </div>

  <!-- ════════════════════════════════════════════════
       FINALE SCREEN
       Video fills frame — two buttons at bottom
       BACK → returns to intro
       CLOSE → closes / returns to landing
  ════════════════════════════════════════════════ -->
  <div class="screen" id="screen-finale">
    <div class="media-wrap"    id="finaleMediaWrap"></div>
    <div class="media-overlay"></div>
    <div class="media-content">
      <div class="finale-buttons">
        <button class="btn-gold"    id="btnRestart">BACK</button>
        <button class="btn-outline" id="btnClose">CLOSE</button>
      </div>
    </div>
  </div>

</div><!-- /device -->

<script>
/* ══════════════════════════════════════════════════
   3C Card Games — Public App
   ──────────────────────────────────────────────────
   ONE JSON fetched once → stored in memory as `deck`
   Each screen reads ONLY its own section on activate:

   screen-intro   → deck.intro   (image or video URL)
   screen-pick    → deck.cards[].id (builds buttons)
   screen-card    → deck.cards[n].front (on select)
                  → deck.cards[n].back  (on flip)
   screen-finale  → deck.finale  (image or video URL)
══════════════════════════════════════════════════ */

  const R2_PUBLIC = 'https://files.3c-public-library.org/CardGames';

  /* ── STATE ──────────────────────────────────────── */
  let deck          = null;
  let selectedCard  = null;
  let isFlipped     = false;
  let finaleLoaded  = false;
  let currentScreen = 'screen-loading';

  /* ── HELPERS ────────────────────────────────────── */
  function getDeckSlug() {
    return new URLSearchParams(window.location.search).get('deck');
  }

  function isVideo(url) {
    return /\.(mp4|webm|mov|ogg)$/i.test(url || '');
  }

  /* ── SCREEN TRANSITION ──────────────────────────── */
  function goTo(id) {
    const from = document.getElementById(currentScreen);
    const to   = document.getElementById(id);
    if (!from || !to || currentScreen === id) return;

    // Pause videos on the screen we're leaving
    from.querySelectorAll('video').forEach(v => { 
      v.pause();
    });

    from.classList.add('fading');
    setTimeout(() => {
      from.classList.remove('active', 'fading');
      to.classList.add('active');
      currentScreen = id;
      onScreenActivate(id);
      
      // Play videos on screen we're entering (after a small delay to ensure they're loaded)
      setTimeout(() => {
        to.querySelectorAll('video').forEach(v => { 
          const playPromise = v.play();
          if (playPromise !== undefined) {
            playPromise.then(() => {
              // Unmute if it was muted
              if (v.muted) {
                setTimeout(() => { v.muted = false; }, 100);
              }
            }).catch(() => {});
          }
        });
      }, 100);
    }, 400);
  }

  /* ── SCREEN ACTIVATE ────────────────────────────── */
  function onScreenActivate(id) {
    switch (id) {
      case 'screen-intro':
        // Always load intro media when screen activates
        const introWrap = document.getElementById('introMediaWrap');
        if (introWrap && introWrap.children.length === 0) {
          loadMedia('introMediaWrap', deck.intro);
        }
        break;
      case 'screen-pick':
        buildNumberGrid(deck.cards);
        break;
      case 'screen-card':
        break;
      case 'screen-finale':
        if (!finaleLoaded) {
          loadMedia('finaleMediaWrap', deck.finale);
          finaleLoaded = true;
        }
        break;
    }
  }

  /* ── LOAD MEDIA ─────────────────────────────────── */
  function loadMedia(wrapId, url) {
    const wrap = document.getElementById(wrapId);
    if (!wrap || !url) return;

    // Clear existing content before loading new media
    if (wrap.children.length > 0) return;

    if (isVideo(url)) {
      // Check if this video was preloaded from landing page
      const preloadedUrl = sessionStorage.getItem('introVideoPreloaded');
      const isPreloaded = (wrapId === 'introMediaWrap' && preloadedUrl === url);
      
      const v       = document.createElement('video');
      v.autoplay    = true;
      v.muted       = isPreloaded ? false : true; // Start with sound if preloaded
      v.loop        = true;
      v.playsInline = true;
      v.controls    = false;
      const s = document.createElement('source');
      s.src   = url;
      s.type  = 'video/mp4';
      v.appendChild(s);
      wrap.appendChild(v);
      
      if (isPreloaded) {
        // Video was preloaded, clear the flag and play with sound immediately
        sessionStorage.removeItem('introVideoPreloaded');
        v.addEventListener('loadeddata', () => {
          v.play().catch(() => {
            // If autoplay with sound fails, mute and try again
            v.muted = true;
            v.play().then(() => {
              setTimeout(() => { v.muted = false; }, 100);
            });
          });
        }, { once: true });
      } else {
        // Not preloaded, use the standard muted approach
        v.addEventListener('loadedmetadata', () => {
          const playPromise = v.play();
          if (playPromise !== undefined) {
            playPromise.then(() => {
              // Video started playing, unmute it
              setTimeout(() => { v.muted = false; }, 100);
            }).catch(() => {
              // Autoplay failed, keep muted
            });
          }
        });
      }
    } else {
      const img = document.createElement('img');
      img.src   = url;
      img.alt   = '';
      wrap.appendChild(img);
    }
  }

  /* ── GOLD COIN CLICK SOUND (Web Audio API) ──────── */
  /*
    Generates a gold coin "ding" sound programmatically.
    No external audio file needed.
  */
  function playClickSound() {
    try {
      const ctx  = new (window.AudioContext || window.webkitAudioContext)();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type      = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.35, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.25);
    } catch (e) { /* silent fallback if audio not supported */ }
  }

  /* ── BUILD NUMBER GRID ──────────────────────────── */
  function buildNumberGrid(cards) {
    const topEl = document.getElementById('numGridTop');
    const midEl = document.getElementById('numGridMiddle');
    const botEl = document.getElementById('numGridBottom');
    if (topEl.children.length > 0) return;

    cards.forEach((card, i) => {
      const btn = document.createElement('button');
      btn.className = 'num-btn';

      // Support custom Canva button image per card
      if (card.buttonImage) {
        btn.style.backgroundImage = `url(${card.buttonImage})`;
        btn.style.backgroundSize  = 'cover';
        btn.style.backgroundPosition = 'center';
        btn.classList.add('has-image');
      }

      btn.innerHTML = `<span>${card.id}</span>`;
      btn.addEventListener('click', () => {
        playClickSound();
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        setTimeout(() => selectCard(card), 220);
      });
      // 3-3-1 layout: 1-3 top, 4-6 middle, 7 bottom
      if (i < 3) topEl.appendChild(btn);
      else if (i < 6) midEl.appendChild(btn);
      else botEl.appendChild(btn);
    });
  }

  /* ── SELECT CARD ────────────────────────────────── */
  function selectCard(card) {
    selectedCard = card;
    isFlipped    = false;

    const scene = document.getElementById('cardScene');
    scene.classList.remove('flipped');
    document.getElementById('tapHint').style.display = 'block';
    document.getElementById('nextBtnWrap').classList.remove('visible');

    const frontEl = document.getElementById('cardFront');
    frontEl.innerHTML = '';
    loadFaceMedia(frontEl, card.front);

    document.getElementById('cardBack').innerHTML = '';

    goTo('screen-card');
  }

  /* ── FLIP CARD ──────────────────────────────────── */
  function flipCard() {
    if (isFlipped) return;
    isFlipped = true;

    const backEl = document.getElementById('cardBack');
    if (backEl.children.length === 0 && selectedCard) {
      loadFaceMedia(backEl, selectedCard.back);
    }

    document.getElementById('cardScene').classList.add('flipped');
    document.getElementById('tapHint').style.display = 'none';
    document.getElementById('nextBtnWrap').classList.add('visible');
  }

  /* ── LOAD FACE MEDIA ────────────────────────────── */
  function loadFaceMedia(faceEl, url) {
    if (!url) return;
    if (isVideo(url)) {
      const v       = document.createElement('video');
      v.autoplay    = true;
      v.muted       = false; // audio on
      v.loop        = true;
      v.playsInline = true;
      const s = document.createElement('source');
      s.src   = url;
      s.type  = 'video/mp4';
      v.appendChild(s);
      faceEl.appendChild(v);
    } else {
      const img = new Image();
      img.src   = url;
      faceEl.appendChild(img);
    }
  }

  /* ── RESET ──────────────────────────────────────── */
  function resetCard() {
    isFlipped    = false;
    selectedCard = null;
    document.getElementById('cardScene').classList.remove('flipped');
    document.getElementById('cardFront').innerHTML = '';
    document.getElementById('cardBack').innerHTML  = '';
    document.getElementById('tapHint').style.display = 'block';
    document.getElementById('nextBtnWrap').classList.remove('visible');
    // Clear selected highlight
    document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('selected'));
  }

  /* ── WIRE BUTTONS ───────────────────────────────── */
  function wireButtons() {
    // Intro → Pick
    document.getElementById('btnStart').onclick = () => goTo('screen-pick');

    // Card tap → flip
    document.getElementById('cardScene').onclick = flipCard;

    // Pick Again
    document.getElementById('btnPickAgain').onclick = () => {
      resetCard();
      goTo('screen-pick');
    };

    // NEXT → Finale
    document.getElementById('btnNext').onclick = () => goTo('screen-finale');

    // BACK → back to Intro
    document.getElementById('btnRestart').onclick = () => {
      resetCard();
      finaleLoaded = false;
      document.getElementById('finaleMediaWrap').innerHTML = '';
      goTo('screen-intro');
    };

    // CLOSE → close tab / return to landing
    document.getElementById('btnClose').onclick = () => {
      window.close();
      setTimeout(() => {
        window.location.href =
          `../landing.html?deck=${encodeURIComponent(getDeckSlug())}`;
      }, 300);
    };
  }

  /* ── INIT ───────────────────────────────────────── */
  async function init() {
    const slug = getDeckSlug();
    if (!slug) { goTo('screen-error'); return; }

    try {
      const res = await fetch(`${R2_PUBLIC}/${slug}/deck.json`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      deck = await res.json();
      wireButtons();
      goTo('screen-intro');
    } catch (err) {
      console.error('Deck load failed:', err);
      goTo('screen-error');
    }
  }

  document.addEventListener('DOMContentLoaded', init);
</script>

</body>
