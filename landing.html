<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Aurion's Lucky Wisdom Deck — 3C Thread To Success</title>

  <!-- Open Graph -->
  <meta property="og:title"       content="Aurion's Lucky Wisdom Deck" />
  <meta property="og:description" content="Pick a card. Receive your wisdom. A lucky message is waiting for you." />
  <meta property="og:image"       content="https://files.3c-public-library.org/CardGames/og-preview.png" />
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="3C Thread To Success" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Aurion's Lucky Wisdom Deck" />
  <meta name="twitter:description" content="Pick a card. Receive your wisdom." />
  <meta name="twitter:image"       content="https://files.3c-public-library.org/CardGames/og-preview.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:," />

  <style>
    /* ── RESET ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    body {
      background: #1a0835;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    /* ── 9:16 PORTRAIT CONTAINER ─────────────────
       Identical sizing logic to public/index.html.
       Desktop: fits in viewport, 9:16 enforced.
       Mobile: fills full screen exactly.
    ─────────────────────────────────────────────── */
    .device {
      position: relative;
      width: min(390px, 56.25vh);
      height: min(844px, 100vh);
      aspect-ratio: 9 / 16;
      background: #3B1265;
      border-radius: clamp(0px, 2vw, 28px);
      overflow: hidden;
      box-shadow:
        0 0 0 1.5px rgba(200,169,110,0.35),
        0 30px 80px rgba(0,0,0,0.6);
    }

    @media (max-width: 480px) {
      body {
        align-items: flex-start;
        background: #3B1265;
      }
      .device {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
        aspect-ratio: unset;
      }
    }

    /* ── MEDIA LAYER ─────────────────────────────
       Image or video fills container exactly.
       object-fit: cover — no gaps, no distortion.
    ─────────────────────────────────────────────── */
    .media-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .media-wrap img,
    .media-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: absolute;
      inset: 0;
    }

    /* Gradient overlay — keeps ENTER button readable */
    .media-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(20,4,50,0.08) 0%,
        rgba(20,4,50,0.58) 100%
      );
      z-index: 1;
    }

    /* ── FALLBACK ─────────────────────────────────
       Shown when no landing image exists in R2 yet.
       Branded gradient with deck title.
    ─────────────────────────────────────────────── */
    .media-fallback {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse at 50% 40%, #5A2090 0%, #1a0835 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
    }

    .fallback-brand {
      font-family: 'Cinzel', serif;
      color: #00D4FF;
      font-size: clamp(0.65rem, 1.8vw, 0.8rem);
      letter-spacing: 0.15em;
      text-align: center;
    }

    .fallback-title {
      font-family: 'Cinzel', serif;
      color: #fff;
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      font-weight: 700;
      text-align: center;
      line-height: 1.4;
    }

    .fallback-divider {
      width: 60%;
      height: 1px;
      background: rgba(200,169,110,0.4);
    }

    /* ── CONTENT LAYER (above overlay) ───────────── */
    .landing-content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 8%;
      width: 100%;
    }

    /* ── ENTER BUTTON ────────────────────────────── */
    .btn-enter {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.85rem, 2.5vw, 1.05rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #3B1265;
      background: linear-gradient(135deg, #E2C98A, #C8A96E);
      border: none;
      border-radius: 50px;
      padding: 15px 54px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(200,169,110,0.45);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .btn-enter:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(200,169,110,0.6);
    }

    .btn-enter:active { transform: scale(0.97); }

    /* ── LOADING STATE ───────────────────────────── */
    #loadingState {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: #1a0835;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      color: #C8A96E;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      letter-spacing: 0.12em;
      animation: pulse 1.8s ease-in-out infinite;
    }

    /* ── ERROR STATE ─────────────────────────────── */
    #errorState {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 10;
      background: #1a0835;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 32px;
      text-align: center;
    }

    #errorState strong {
      font-family: 'Cinzel', serif;
      color: #C8A96E;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
    }

    #errorState p {
      color: rgba(255,255,255,0.6);
      font-size: clamp(0.75rem, 2vw, 0.88rem);
      line-height: 1.6;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="device" id="device">

  <!-- Loading -->
  <div id="loadingState">Loading…</div>

  <!-- Error -->
  <div id="errorState">
    <strong>Deck not found</strong>
    <p>This link may be invalid or the deck has been removed.</p>
  </div>

  <!-- Fallback branded background (when no R2 landing image yet) -->
  <div class="media-fallback" id="mediaFallback" style="display:none;">
    <span class="fallback-brand">3C Thread To Success</span>
    <div class="fallback-divider"></div>
    <span class="fallback-title" id="fallbackTitle">Aurion's Lucky Wisdom Deck</span>
  </div>

  <!-- Media layer: image or video from R2 -->
  <div class="media-wrap"    id="mediaWrap"    style="display:none;"></div>
  <div class="media-overlay" id="mediaOverlay" style="display:none;"></div>

  <!-- ENTER button -->
  <div class="landing-content" id="landingContent" style="display:none;">
    <button class="btn-enter" id="btnEnter">ENTER</button>
  </div>

</div><!-- /device -->

<script>
/* ══════════════════════════════════════════════════
   landing.html — 3C Card Games
   ──────────────────────────────────────────────────
   1. Reads ?deck= slug from URL
   2. Fetches deck.json from R2 to get title
   3. Loads landing image/video from R2 into container
   4. ENTER → public/index.html?deck={slug}
══════════════════════════════════════════════════ */

  const R2_PUBLIC  = 'https://files.3c-public-library.org/CardGames';
  const PUBLIC_APP = 'public/index.html';

  /* ── Helpers ────────────────────────────────── */
  function getDeckSlug() {
    return new URLSearchParams(window.location.search).get('deck');
  }

  function isVideo(url) {
    return /\.(mp4|webm|mov|ogg)$/i.test(url || '');
  }

  function showError() {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display   = 'flex';
  }

  /* ── Show landing ────────────────────────────── */
  function showLanding(slug, deckJson) {
    document.getElementById('loadingState').style.display = 'none';

    const title       = (deckJson && deckJson.title) || '';
    const landingUrl  = (deckJson && deckJson.landing)
                          ? deckJson.landing
                          : `${R2_PUBLIC}/${slug}/landing.png`;

    // Preload intro video in background if it exists
    const introUrl = (deckJson && deckJson.intro) || null;
    if (introUrl && isVideo(introUrl)) {
      const preloadVideo = document.createElement('video');
      preloadVideo.preload = 'auto';
      preloadVideo.muted = true;
      preloadVideo.style.display = 'none';
      const preloadSource = document.createElement('source');
      preloadSource.src = introUrl;
      preloadSource.type = 'video/mp4';
      preloadVideo.appendChild(preloadSource);
      document.body.appendChild(preloadVideo);
      // Store intro URL for public app
      sessionStorage.setItem('introVideoPreloaded', introUrl);
    }

    /* ── Inject media ─────────────────────────── */
    if (isVideo(landingUrl)) {
      // Video
      const v = document.createElement('video');
      v.autoplay    = true;
      v.muted       = true;
      v.loop        = true;
      v.playsInline = true;
      const s = document.createElement('source');
      s.src  = landingUrl;
      s.type = 'video/mp4';
      v.appendChild(s);
      document.getElementById('mediaWrap').appendChild(v);
      document.getElementById('mediaWrap').style.display    = 'block';
      document.getElementById('mediaOverlay').style.display = 'block';

    } else {
      // Image — try loading; fallback to gradient on error
      const img    = new Image();
      img.onload   = () => {
        document.getElementById('mediaWrap').appendChild(img);
        document.getElementById('mediaWrap').style.display    = 'block';
        document.getElementById('mediaOverlay').style.display = 'block';
      };
      img.onerror  = () => {
        // No landing image in R2 yet — show branded fallback
        const fallbackTitle = document.getElementById('fallbackTitle');
        if (fallbackTitle && title) fallbackTitle.textContent = title;
        document.getElementById('mediaFallback').style.display = 'flex';
        document.getElementById('mediaOverlay').style.display  = 'block';
      };
      img.src = landingUrl;
      img.alt = title || 'Landing';
    }

    /* ── Show ENTER button ───────────────────── */
    const contentEl = document.getElementById('landingContent');
    contentEl.style.display = 'flex';

    document.getElementById('btnEnter').onclick = () => {
      window.location.href = `${PUBLIC_APP}?deck=${encodeURIComponent(slug)}`;
    };
  }

  /* ── INIT ───────────────────────────────────── */
  (function init() {
    const slug = getDeckSlug();

    if (!slug) {
      showError();
      return;
    }

    // Fetch deck JSON to get title + correct landing URL
    fetch(`${R2_PUBLIC}/${slug}/deck.json`)
      .then(r => {
        if (!r.ok) throw new Error('Not found');
        return r.json();
      })
      .then(data  => showLanding(slug, data))
      .catch(()   => {
        // JSON not found — still show landing with slug-based URL
        // (deck may not be saved yet but image may exist)
        showLanding(slug, null);
      });
  })();
</script>

</body>
</html>
